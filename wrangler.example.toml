name = "{{WORKER_NAME}}"
main = "src/index.ts"
compatibility_date = "2026-06-01"

# Cloudflare cron runs in UTC. The Worker wakes up every 15 minutes
# and checks whether it is a configured report time in REPORT_TIMEZONE.
[triggers]
crons = ["*/15 * * * *"]

[observability]
enabled = true

[vars]
PROJECT_DISPLAY_NAME = {{PROJECT_DISPLAY_NAME}}
# Optional: Discord display name + footer signature. Defaults to "Steam Reporter".
# DISCORD_USERNAME = "Your Steam Reporter"
STEAM_APP_ID = {{STEAM_APP_ID}}
# Sales/owners and live player count can point at a different app (e.g. a demo).
# Leave equal to STEAM_APP_ID for a single-app setup.
STEAM_SALES_APP_ID = {{STEAM_SALES_APP_ID}}
STEAM_PLAYER_COUNT_APP_ID = {{STEAM_PLAYER_COUNT_APP_ID}}
ENABLE_WISHLIST_REPORTING = {{ENABLE_WISHLIST_REPORTING}}
ENABLE_SALES_REPORTING = {{ENABLE_SALES_REPORTING}}
ENABLE_PLAYER_COUNT_REPORTING = {{ENABLE_PLAYER_COUNT_REPORTING}}
ENABLE_DAILY_DIGEST = {{ENABLE_DAILY_DIGEST}}
DAILY_DIGEST_LOCAL_HOUR = {{DAILY_DIGEST_LOCAL_HOUR}}
SEND_EMPTY_REPORTS = {{SEND_EMPTY_REPORTS}}
BASELINE_SALES_ON_FIRST_RUN = "true"
TOP_COUNTRY_LIMIT = {{TOP_COUNTRY_LIMIT}}
REPORT_TIMEZONE = {{REPORT_TIMEZONE}}
REPORT_INTERVAL_HOURS = {{REPORT_INTERVAL_HOURS}}
# Optional: sub-hour cadence in minutes. Overrides REPORT_INTERVAL_HOURS when set.
# The cron fires every 15 min, so the effective minimum is 15. Example: "30".
# REPORT_INTERVAL_MINUTES = "30"
FIRST_LOCAL_REPORT_HOUR = {{FIRST_LOCAL_REPORT_HOUR}}

[[kv_namespaces]]
binding = "{{KV_NAMESPACE_BINDING}}"
id = "{{KV_NAMESPACE_ID}}"
